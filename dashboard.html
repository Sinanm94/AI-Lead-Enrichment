<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lead Enrichment | Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // Customizing tailwind colors for subtle blue accents
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9', // Sky blue for primary accents
                            600: '#0284c7', // Hover state blue
                            700: '#0369a1',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAFAFA;
        }

        /* Keep color-coded badges (semantic, not stylistic) */
        .badge-high {
            color: #065F46;
            background-color: #ECFDF5;
            border: 1px solid #A7F3D0;
        }

        .badge-med {
            color: #92400E;
            background-color: #FFFBEB;
            border: 1px solid #FDE68A;
        }

        .badge-low {
            color: #991B1B;
            background-color: #FEF2F2;
            border: 1px solid #FECACA;
        }
    </style>
</head>

<body class="text-gray-800 antialiased selection:bg-brand-100">

    <div class="max-w-6xl mx-auto py-12 px-6">

        <header class="mb-10 flex flex-col md:flex-row md:items-end justify-between border-b border-gray-200 pb-6">
            <div>
                <h1 class="text-2xl font-semibold tracking-tight text-gray-900">Lead Enrichment Console</h1>
                <p class="text-sm text-gray-500 mt-1">Local NLP Pipeline &bull; Deterministic Scoring</p>
            </div>

            <div class="mt-4 md:mt-0 flex items-center space-x-3">
                <label for="sort-leads" class="text-xs font-medium text-gray-400 uppercase tracking-widest">Sort
                    By</label>
                <select id="sort-leads"
                    class="text-sm border-gray-300 rounded-md shadow-sm focus:ring-brand-500 focus:border-brand-500 py-1.5 pl-3 pr-8 bg-white border cursor-pointer hover:border-brand-500 transition-colors">
                    <option value="default">Original Order</option>
                    <option value="score-desc">Score: High to Low</option>
                    <option value="score-asc">Score: Low to High</option>
                    <option value="budget-desc">Budget: Highest</option>
                </select>
            </div>
        </header>

        <div class="grid grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                <p class="text-xs font-medium text-gray-400 uppercase tracking-widest mb-1">Total Leads</p>
                <p class="text-2xl font-semibold text-brand-600" id="stat-total">0</p>
            </div>
            <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                <p class="text-xs font-medium text-gray-400 uppercase tracking-widest mb-1">Qualified (≥7.0)</p>
                <p class="text-2xl font-semibold text-brand-600" id="stat-high">0</p>
            </div>
            <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                <p class="text-xs font-medium text-gray-400 uppercase tracking-widest mb-1">Avg Score</p>
                <p class="text-2xl font-semibold text-brand-600" id="stat-avg">0.0</p>
            </div>
        </div>

        <div id="leads-container" class="grid grid-cols-1 md:grid-cols-2 gap-5">
        </div>

    </div>

    <script>
        let globalLeadsData = [];

        fetch('enriched_leads.json')
            .then(response => response.json())
            .then(data => {
                globalLeadsData = data;
                updateStats(globalLeadsData);
                renderLeads(globalLeadsData);
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('leads-container').innerHTML = `
                    <div class="col-span-2 p-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-md">
                        Failed to load data. Ensure local server is running.
                    </div>`;
            });

        document.getElementById('sort-leads').addEventListener('change', (e) => {
            const sortType = e.target.value;
            let sortedData = [...globalLeadsData];

            if (sortType === 'score-desc') {
                sortedData.sort((a, b) => parseFloat(b.ai_quality_score || 0) - parseFloat(a.ai_quality_score || 0));
            } else if (sortType === 'score-asc') {
                sortedData.sort((a, b) => parseFloat(a.ai_quality_score || 0) - parseFloat(b.ai_quality_score || 0));
            } else if (sortType === 'budget-desc') {
                sortedData.sort((a, b) => {
                    const budgetA = parseFloat((a.Budget || "0").replace(/[^0-9.-]+/g, ""));
                    const budgetB = parseFloat((b.Budget || "0").replace(/[^0-9.-]+/g, ""));
                    return budgetB - budgetA;
                });
            }
            renderLeads(sortedData);
        });

        function renderLeads(data) {
            const container = document.getElementById('leads-container');
            container.innerHTML = '';

            data.forEach(lead => {
                const score = parseFloat(lead.ai_quality_score || 0).toFixed(1);
                let badgeClass = 'badge-low';
                if (score >= 7.0) badgeClass = 'badge-high';
                else if (score >= 5.0) badgeClass = 'badge-med';

                const card = `
                    <div class="bg-white rounded-xl border border-gray-200 shadow-sm hover:border-gray-300 hover:shadow-md transition-all duration-200 flex flex-col">
                        <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-slate-50 rounded-t-xl">
                            <div>
                                <h3 class="text-base font-semibold text-gray-900">${lead.Name || 'Unknown'}</h3>
                                <p class="text-xs text-gray-500 mt-0.5 tracking-wide">${lead.Phone || lead.Contact || 'No Contact'}</p>
                            </div>
                            <span class="px-2.5 py-1 rounded-md text-xs font-semibold ${badgeClass}">
                                ${score} / 10
                            </span>
                        </div>
                        
                        <div class="px-5 py-4 grid grid-cols-2 gap-y-3 gap-x-4 text-sm border-b border-gray-100">
                            <div>
                                <span class="text-gray-400 block text-[11px] uppercase tracking-wider font-medium mb-0.5">Area</span>
                                <span class="text-gray-900 font-medium">${lead.Area || 'N/A'}</span>
                            </div>
                            <div>
                                <span class="text-gray-400 block text-[11px] uppercase tracking-wider font-medium mb-0.5">Budget</span>
                                <span class="text-gray-900 font-medium">${lead.Budget || '0 AED'}</span>
                            </div>
                            <div>
                                <span class="text-gray-400 block text-[11px] uppercase tracking-wider font-medium mb-0.5">Property</span>
                                <span class="text-gray-900">${lead.Property_Type || 'N/A'}</span>
                            </div>
                            <div>
                                <span class="text-gray-400 block text-[11px] uppercase tracking-wider font-medium mb-0.5">Market Tier</span>
                                <span class="text-gray-900">${lead.ai_area_tier || 'N/A'}</span>
                            </div>
                        </div>

                        <div class="p-5 bg-white rounded-b-xl flex-grow">
                            <h4 class="text-[11px] font-semibold text-brand-600 uppercase tracking-wider mb-2 flex items-center">
                                <svg class="w-3.5 h-3.5 mr-1" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1.323l3.954 1.582 1.599-.8a1 1 0 01.894 1.79l-1.233.616 1.738 5.42a1 1 0 01-.286 1.05A3.981 3.981 0 0115 15a3.981 3.981 0 01-2.666-1.019 1 1 0 01-.286-1.05l1.715-5.349L11 6.477V16h2a1 1 0 110 2H7a1 1 0 110-2h2V6.477L5.237 7.582l1.715 5.349a1 1 0 01-.286 1.05A3.981 3.981 0 014 15a3.981 3.981 0 01-2.666-1.019 1 1 0 01-.286-1.05l1.738-5.42-1.233-.617a1 1 0 01.894-1.788l1.599.799L8 4.323V3a1 1 0 011-1zm-5 8.274l-.818 2.552c.25.112.526.174.818.174.292 0 .569-.062.818-.174L5 10.274zm10 0l-.818 2.552c.25.112.526.174.818.174.292 0 .569-.062.818-.174L15 10.274z"/></svg>
                                AI Strategy
                            </h4>
                            <p class="text-sm text-gray-600 leading-relaxed">${lead.ai_agent_notes || 'No notes generated.'}</p>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', card);
            });
        }

        function updateStats(data) {
            let totalScore = 0;
            let highQualityCount = 0;
            data.forEach(lead => {
                const score = parseFloat(lead.ai_quality_score || 0);
                totalScore += score;
                if (score >= 7.0) highQualityCount++;
            });
            document.getElementById('stat-total').innerText = data.length;
            document.getElementById('stat-high').innerText = highQualityCount;
            if (data.length > 0) {
                document.getElementById('stat-avg').innerText = (totalScore / data.length).toFixed(1);
            }
        }
    </script>
</body>

</html>
